name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  security-events: write # Needed to upload-sarif
  actions: read # Potentially needed for private repositories (see https://github.com/github/codeql-action/issues/2117)

jobs:
  validate:
    name: "Validate stack (${{ github.ref_name }})"
    uses: atrakic/terraform-test-workflow/.github/workflows/tf-reusable-workflow.yml@main
    with:
      terraform_version: ">= 1.0"

  release:
    name: "Create GitHub Release (${{ github.ref_name }})"
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Package stack
        run: |
          tar --exclude='.git' \
              --exclude='.terraform' \
              --exclude='*.tfstate' \
              --exclude='*.tfstate.backup' \
              -czf /tmp/stack-${{ github.ref_name }}.tar.gz .
          mv /tmp/stack-${{ github.ref_name }}.tar.gz .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: stack-${{ github.ref_name }}.tar.gz
          body: |
            ## Release ${{ github.ref_name }}

            ### Stack contents
            - Terraform root module and child modules (`modules/`)
            - Docker source for API and web services (`src/`)
            - Docker Compose files for local development
            - CI/CD workflows

            Download `stack-${{ github.ref_name }}.tar.gz` for the full deployable stack.
